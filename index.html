<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="authGate" class="auth-gate hidden">
    <form id="authForm" class="auth-card">
      <h2 id="authTitle">Login</h2>
      <p id="authHint">Enter your password to unlock journal.</p>
      <label id="authProfileRow" class="hidden">Profile Name <input type="text" id="authProfileName" placeholder="anoldschoolguy" /></label>
      <label>Password <input type="password" id="authPassword" required /></label>
      <button id="authSubmit" type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <button id="btnOpenFolder" class="btn">Refresh Trades</button>
        <button id="btnNewTrade" class="btn btn-primary">New Trade</button>
      </div>

      <form id="newTradeForm" class="panel hidden">
        <h3>New Trade</h3>
        <label>Date <input type="date" id="tradeDate" required /></label>
        <label>Time <input type="time" id="tradeTime" required /></label>
        <label>Trade Name <input type="text" id="tradeName" placeholder="NIFTY breakout retest" required /></label>
        <label>Buy Price <input type="number" step="0.01" id="tradeBuyPrice" placeholder="optional" /></label>
        <label>Sell Price <input type="number" step="0.01" id="tradeSellPrice" placeholder="optional" /></label>
        <label>Quantity <input type="number" step="0.01" id="tradeQty" placeholder="1" /></label>
        <label>PnL <input type="number" step="0.01" id="tradePnl" placeholder="optional" /></label>
        <label>Tags (comma separated) <input type="text" id="tradeTags" placeholder="opening,trend" /></label>
        <div class="row">
          <button type="submit" class="btn btn-primary">Create</button>
          <button type="button" id="btnCancelTrade" class="btn">Cancel</button>
        </div>
      </form>

      <div class="panel">
        <h3>Search</h3>
        <label>Trade Name <input type="text" id="searchName" placeholder="breakout retest" /></label>
        <label>Date (DD/MM/YYYY) <input type="text" id="searchDate" placeholder="31/03/2026" /></label>
        <label>Tag <input type="text" id="searchTag" placeholder="opening" /></label>
      </div>

      <div id="tradeList" class="trade-list"></div>

      <section id="tradeDetailsPanel" class="panel">
        <h3>Selected Trade Details</h3>
        <div class="details-grid">
          <label>Trade Name <input type="text" id="detailTradeName" /></label>
          <label>Buy Price <input type="number" step="0.01" id="detailBuyPrice" /></label>
          <label>Sell Price <input type="number" step="0.01" id="detailSellPrice" /></label>
          <label>Quantity <input type="number" step="0.01" id="detailQty" /></label>
          <label>PnL <input type="number" step="0.01" id="detailPnl" /></label>
          <label>Tags (comma separated) <input type="text" id="detailTags" /></label>
        </div>
        <button id="btnSaveTradeDetails" type="button" class="btn">Save Trade Details</button>
      </section>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div class="row">
          <button id="toolSelect" class="btn active">Select</button>
          <button id="toolText" class="btn">Text</button>
          <button id="toolArrow" class="btn">Arrow</button>
          <button id="toolRect" class="btn">Rect</button>
          <button id="btnZoomOut" class="btn">Zoom -</button>
          <button id="btnZoomIn" class="btn">Zoom +</button>
          <button id="btnZoomReset" class="btn">100%</button>
          <button id="btnBoardShrink" class="btn">Space -</button>
          <button id="btnBoardExpand" class="btn">Space +</button>
          <button id="btnImgSmaller" class="btn">Img -</button>
          <button id="btnImgBigger" class="btn">Img +</button>
          <button id="btnDeleteItem" class="btn">Delete</button>
          <button id="btnSaveCanvas" class="btn btn-primary">Save Canvas</button>
        </div>
        <div class="toolbar-right">
          <div id="activeTradeTitle" class="active-trade-title">No trade selected</div>
          <button id="btnProfileMenu" class="icon-btn profile-icon" type="button" title="Profile & Security">👤</button>
          <div id="profilePanel" class="panel profile-popover hidden">
            <h3>Profile & Security</h3>
            <div class="row">
              <button id="btnViewJournal" type="button" class="btn active">Journal</button>
              <button id="btnViewAnalytics" type="button" class="btn">Analytics</button>
            </div>
            <label>Profile Name <input type="text" id="profileName" placeholder="your name" /></label>
            <div class="row">
              <button id="btnSaveProfile" type="button" class="btn">Save Profile</button>
              <button id="btnLogout" type="button" class="btn">Logout</button>
            </div>
            <label>Current Password <input type="password" id="currentPassword" /></label>
            <label>New Password <input type="password" id="newPassword" /></label>
            <button id="btnChangePassword" type="button" class="btn">Change Password</button>
          </div>
        </div>
      </header>

      <section id="journalPage" class="page">
        <section id="canvasHost" class="canvas-host"></section>
      </section>

      <section id="analyticsPage" class="page hidden">
        <section id="stats" class="stats analytics-full">
          <h3>Overall Analytics</h3>
          <div class="stats-grid">
            <div class="card"><span>Total PnL</span><strong id="statTotalPnl">-</strong></div>
            <div class="card"><span>Trade Count</span><strong id="statTradeCount">-</strong></div>
            <div class="card"><span>Hit Rate</span><strong id="statHitRate">-</strong></div>
            <div class="card"><span>Wins / Losses</span><strong id="statWinLoss">-</strong></div>
            <div class="card full">
              <span>Trade Ledger</span>
              <div class="table-wrap">
                <table class="ledger-table">
                  <thead>
                    <tr>
                      <th>Trade</th>
                      <th>Buy</th>
                      <th>Sell</th>
                      <th>Qty</th>
                      <th>PnL</th>
                      <th>Date</th>
                    </tr>
                  </thead>
                  <tbody id="overallTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
